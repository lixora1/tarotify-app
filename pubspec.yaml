name: tarotify
description: AI Destekli Mistik Fal Uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # AdMob
  google_mobile_ads: ^4.0.0
  
  # In-App Purchase
  in_app_purchase: ^3.1.13
  
  # AI / HTTP
  http: ^1.2.0
  
  # Image picker
  image_picker: ^1.0.7
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  
  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
